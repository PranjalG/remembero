name: task_manager_app
description: "Flutter project that remembers your daily tasks"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  uuid: ^4.5.3
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/remembero_splash.png

  android: true
  ios: true

  android_12:
    image: assets/images/remembero_splash.png
    icon_background_color: "#ffffff"

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/remembero_splash.png
#    - images/a_dot_ham.jpeg

